name: Release Smoke

on:
  push:
    branches: [ "main" ]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Linux Tauri dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libappindicator3-dev \
          librsvg2-dev \
          patchelf

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" pyinstaller

    - name: Install Node dependencies
      working-directory: ./web
      run: npm ci

    - name: Build Frontend
      working-directory: ./web
      run: npm run build

    - name: Build and stage Tauri sidecar
      shell: bash
      run: ./scripts/build-sidecar.sh

    - name: Release smoke audit
      run: python scripts/release_smoke.py --mode audit

    - name: Cargo build smoke
      run: cargo build --manifest-path src-tauri/Cargo.toml

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Simanalysis-sidecar-${{ matrix.os }}
        path: src-tauri/binaries/
