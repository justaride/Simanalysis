[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals
    --tb=short
    --cov=simanalysis
    --cov-report=term-missing:skip-covered
    --cov-report=html
    --cov-report=xml
    --cov-branch

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    requires_mods: marks tests that require real mod files
    unit: marks tests as unit tests
    parser: marks tests for parser modules
    detector: marks tests for detector modules
    analyzer: marks tests for analyzer modules
    benchmark: marks tests as performance benchmarks

filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    # Starlette 1.2+ warns when its TestClient uses httpx; match by message so this
    # also works on the older Starlette installed under Python 3.9 (which lacks the
    # StarletteDeprecationWarning class).
    ignore:Using .httpx. with .starlette.testclient. is deprecated:Warning
